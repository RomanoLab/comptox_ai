services:
  memgraph:
    image: memgraph/memgraph:2.18.1
    command: ["--memory-limit=12288", "--log-level=WARNING"]
    volumes:
      - memgraph-data:/var/lib/memgraph
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 14G
    restart: unless-stopped

  bolt-proxy:
    image: ghcr.io/romanolab/comptox-bolt-proxy:${IMAGE_TAG:-latest}
    environment:
      LISTEN_ADDR: ":7688"
      BACKEND_ADDR: "memgraph:7687"
      HEALTH_ADDR: ":8081"
    depends_on:
      - memgraph
    networks:
      - internal
    restart: unless-stopped

  api:
    image: ghcr.io/romanolab/comptox-api:${IMAGE_TAG:-latest}
    environment:
      COMPTOX_AI_DATABASE_URL: "bolt://memgraph:7687"
      PORT: "3001"
      NODE_ENV: "production"
      API_PUBLIC_URL: "https://api.comptox.ai"
    depends_on:
      - memgraph
    networks:
      - internal
    restart: unless-stopped

  lab:
    image: memgraph/lab:2.18.1
    environment:
      QUICK_CONNECT_MG_HOST: "bolt-proxy"
      QUICK_CONNECT_MG_PORT: "7688"
    depends_on:
      - bolt-proxy
    networks:
      - internal
    restart: unless-stopped

  caddy:
    build: infra/caddy
    ports:
      - "80:80"
      - "443:443"
      - "7687:7687"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - lab
      - bolt-proxy
    networks:
      - internal
    restart: unless-stopped

volumes:
  memgraph-data:
  caddy-data:
  caddy-config:

networks:
  internal:
